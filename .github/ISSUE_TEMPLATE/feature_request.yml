name: 💡 问题建议
description: 提一个功能建议或改进想法
title: "[建议] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议!请说明你希望解决什么问题、想要什么效果。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你在使用中遇到什么不便?或缺少什么能力?
      placeholder: "我在使用……时,觉得……很不方便"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么改进?如果有具体想法请描述。
      placeholder: "希望可以……"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 可选。你考虑过哪些其他解决办法?为什么觉得这个更好?
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: PryFox VM 版本
      placeholder: "例如 0.1.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 可选。任何有助于理解这个建议的额外信息。
    validations:
      required: false
